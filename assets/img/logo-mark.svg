<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NetGenX network node mark">
  <defs>
    <linearGradient id="ngx-mark-grad" x1="8" y1="6" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <radialGradient id="ngx-mark-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#BBD3FF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </radialGradient>
  </defs>
  <g stroke="url(#ngx-mark-grad)" stroke-width="1.6" stroke-linecap="round" opacity="0.9">
    <!-- spokes from center -->
    <line x1="24" y1="24" x2="39" y2="24"/>
    <line x1="24" y1="24" x2="31.5" y2="11"/>
    <line x1="24" y1="24" x2="16.5" y2="11"/>
    <line x1="24" y1="24" x2="9" y2="24"/>
    <line x1="24" y1="24" x2="16.5" y2="37"/>
    <line x1="24" y1="24" x2="31.5" y2="37"/>
    <!-- hexagon perimeter -->
    <line x1="39" y1="24" x2="31.5" y2="37"/>
    <line x1="31.5" y1="37" x2="16.5" y2="37"/>
    <line x1="16.5" y1="37" x2="9" y2="24"/>
    <line x1="9" y1="24" x2="16.5" y2="11"/>
    <line x1="16.5" y1="11" x2="31.5" y2="11"/>
    <line x1="31.5" y1="11" x2="39" y2="24"/>
  </g>
  <g fill="url(#ngx-mark-grad)">
    <circle cx="39" cy="24" r="2.6"/>
    <circle cx="31.5" cy="11" r="2.6"/>
    <circle cx="16.5" cy="11" r="2.6"/>
    <circle cx="9" cy="24" r="2.6"/>
    <circle cx="16.5" cy="37" r="2.6"/>
    <circle cx="31.5" cy="37" r="2.6"/>
  </g>
  <circle cx="24" cy="24" r="4" fill="url(#ngx-mark-core)"/>
</svg>
